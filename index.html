<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Live - Retro Stream</title>
    <!-- Mixed content warning: If deployed to HTTPS (like Render), HTTP streams may be blocked by browsers -->
    <meta name="description" content="Retro World Cup Live Video Player">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <header>
        <h1>[ World Cup Live Stream ]</h1>
    </header>

    <main class="window">
        <div class="title-bar">
            <div class="title-bar-text">VideoPlayer.exe</div>
            <div class="title-bar-controls">
                <button class="btn" aria-label="Minimize">_</button>
                <button class="btn" aria-label="Maximize">[]</button>
                <button class="btn" aria-label="Close">X</button>
            </div>
        </div>
        <div class="content">
            <div class="video-container">
                <video id="videoPlayer" controls autoplay muted playsinline></video>
                <div id="loading" class="overlay-text">LOADING SIGNAL...</div>
                <div id="unmuteOverlay" class="unmute-overlay" style="display: none;">[ CLICK TO UNMUTE ]</div>
            </div>
            <div class="marquee-container">
                <marquee scrollamount="6">>>> LIVE WORLD CUP MATCH - STAY CONNECTED - CHAT WITH OTHER FANS BELOW <<<</marquee>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('videoPlayer');
            const loading = document.getElementById('loading');
            const unmuteOverlay = document.getElementById('unmuteOverlay');
            const videoSrc = 'https://live.kooran3.cfd/live1/index.m3u8';

            const unmuteVideo = () => {
                video.muted = false;
                unmuteOverlay.style.display = 'none';
            };

            unmuteOverlay.addEventListener('click', (e) => {
                e.stopPropagation();
                unmuteVideo();
            });

            video.addEventListener('click', (e) => {
                if (video.muted) {
                    e.preventDefault();
                    unmuteVideo();
                }
            });

            video.addEventListener('volumechange', () => {
                if (!video.muted) {
                    unmuteOverlay.style.display = 'none';
                } else {
                    unmuteOverlay.style.display = 'block';
                }
            });

            function initPlayer() {
                if (Hls.isSupported()) {
                    const hls = new Hls({
                        debug: false,
                        enableWorker: true
                    });
                    
                    hls.loadSource(videoSrc);
                    hls.attachMedia(video);
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, function () {
                        loading.style.display = 'none';
                        if (video.muted) {
                            unmuteOverlay.style.display = 'block';
                        }
                        video.play().catch(err => {
                            console.log("Autoplay blocked, waiting for interaction:", err);
                        });
                        console.log('Stream loaded directly!');
                    });
                    
                    hls.on(Hls.Events.ERROR, function (event, data) {
                        if (data.fatal) {
                            switch (data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    loading.innerText = 'NETWORK ERROR: Stream offline or blocked by browser.';
                                    loading.style.color = 'red';
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    loading.innerText = 'MEDIA ERROR: Trying to recover...';
                                    hls.recoverMediaError();
                                    break;
                                default:
                                    loading.innerText = 'FATAL ERROR: Cannot load stream.';
                                    hls.destroy();
                                    break;
                            }
                        }
                    });
                    
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoSrc;
                    video.addEventListener('loadedmetadata', function () {
                        loading.style.display = 'none';
                        if (video.muted) {
                            unmuteOverlay.style.display = 'block';
                        }
                    });
                    video.addEventListener('error', function () {
                        loading.innerText = 'ERROR: Cannot load stream.';
                        loading.style.color = 'red';
                    });
                } else {
                    loading.innerText = 'YOUR BROWSER DOES NOT SUPPORT HLS VIDEO.';
                    loading.style.color = 'red';
                }
            }

            initPlayer();

            // Chat Window Toggle Logic
            const chatLauncher = document.getElementById('chatLauncher');
            const chatWindow = document.getElementById('chatWindow');
            const closeChatBtn = document.getElementById('closeChatBtn');

            chatLauncher.addEventListener('click', () => {
                chatWindow.style.display = 'flex';
                chatLauncher.style.display = 'none';
            });

            closeChatBtn.addEventListener('click', () => {
                chatWindow.style.display = 'none';
                chatLauncher.style.display = 'block';
            });
        });
    </script>

    <!-- Minnit Chat HTML & Script -->
    <button id="chatLauncher" class="chat-launcher">[ CHAT ]</button>

    <div id="chatWindow" class="chat-window window" style="display: none;">
        <div class="title-bar">
            <div class="title-bar-text">ChatRoom.exe</div>
            <div class="title-bar-controls">
                <button class="btn" id="closeChatBtn" aria-label="Close">X</button>
            </div>
        </div>
        <div class="content">
            <div class="chat-iframe-container">
                <span class="minnit-chat-sembed" data-chatname="https://organizations.minnit.chat/791982019011557/c/Main?embed" data-style="width:100%; height:100%;" data-version="1.55">Chat</span>
            </div>
            <p class="powered-by-minnit">
                <a href="https://minnit.chat" target="_blank">Get your own free chatroom with Minnit Chat</a>
            </p>
        </div>
    </div>

    <script src="https://minnit.chat/js/embed.js?c=1772345192" defer></script>
</body>
</html>
