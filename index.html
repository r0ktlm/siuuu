<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Live - Retro Stream</title>
    <!-- Mixed content warning: If deployed to HTTPS (like Render), HTTP streams may be blocked by browsers -->
    <meta name="description" content="Retro World Cup Live Video Player">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <header>
        <h1>[ World Cup Live Stream ]</h1>
    </header>

    <main class="window">
        <div class="title-bar">
            <div class="title-bar-text">VideoPlayer.exe</div>
            <div class="title-bar-controls">
                <button class="btn" aria-label="Minimize">_</button>
                <button class="btn" aria-label="Maximize">[]</button>
                <button class="btn" aria-label="Close">X</button>
            </div>
        </div>
        <div class="content">
            <div class="video-container">
                <video id="videoPlayer" controls></video>
                <div id="loading" class="overlay-text">LOADING SIGNAL...</div>
            </div>
            <div class="marquee-container">
                <marquee scrollamount="6">>>> LIVE WORLD CUP MATCH - STAY CONNECTED - CHAT WITH OTHER FANS BELOW <<<</marquee>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('videoPlayer');
            const loading = document.getElementById('loading');
            
            // Check if we are running locally (http/localhost) or on HTTPS (GitHub Pages/Render)
            const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || !window.location.hostname;
            
            // Use direct HTTP if local (to avoid SSL certificate warning), otherwise use HTTPS (requires accepting the self-signed cert once in a new tab)
            const videoSrc = isLocal 
                ? 'http://103.151.61.12/T-Sports.kutta/video.m3u8' 
                : 'https://103.151.61.12/T-Sports.kutta/video.m3u8';

            function initPlayer() {
                if (Hls.isSupported()) {
                    const hls = new Hls({
                        debug: false,
                        enableWorker: true
                    });
                    
                    hls.loadSource(videoSrc);
                    hls.attachMedia(video);
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, function () {
                        loading.style.display = 'none';
                        console.log('Stream loaded directly!');
                    });
                    
                    hls.on(Hls.Events.ERROR, function (event, data) {
                        if (data.fatal) {
                            switch (data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    if (!isLocal) {
                                        loading.innerHTML = 'NETWORK ERROR: Stream offline OR browser blocked the uncertified HTTPS connection.<br><br><a href="https://103.151.61.12/T-Sports.kutta/video.m3u8" target="_blank" style="color: #0f0; text-decoration: underline;">[ CLICK HERE TO WHITELIST CERTIFICATE ]</a><br>Then click "Advanced" -> "Proceed anyway", and refresh this page.';
                                    } else {
                                        loading.innerText = 'NETWORK ERROR: Stream offline or connection failed.';
                                    }
                                    loading.style.color = 'red';
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    loading.innerText = 'MEDIA ERROR: Trying to recover...';
                                    hls.recoverMediaError();
                                    break;
                                default:
                                    loading.innerText = 'FATAL ERROR: Cannot load stream.';
                                    hls.destroy();
                                    break;
                            }
                        }
                    });
                    
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoSrc;
                    video.addEventListener('loadedmetadata', function () {
                        loading.style.display = 'none';
                    });
                    video.addEventListener('error', function () {
                        loading.innerText = 'ERROR: Cannot load stream.';
                        loading.style.color = 'red';
                    });
                } else {
                    loading.innerText = 'YOUR BROWSER DOES NOT SUPPORT HLS VIDEO.';
                    loading.style.color = 'red';
                }
            }

            initPlayer();
        });
    </script>

    <!--End of Tawk.to Script-->
</body>
</html>
